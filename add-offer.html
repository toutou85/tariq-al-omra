<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدراج عرض عمرة</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tajawal,Arial;
  background:#f5f5f5;
}

/* زر القائمة */
.menu-btn{
  position:fixed;
  top:15px;
  right:15px;
  background:#8b0000;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:10px 14px;
  font-size:20px;
  cursor:pointer;
  z-index:1003;
}

/* overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:1001;
}
.overlay.active{display:block}

/* sidebar */
.sidebar{
  position:fixed;
  top:0;
  right:-280px;
  width:260px;
  height:100%;
  background:#fff;
  padding:20px;
  box-shadow:-2px 0 10px rgba(0,0,0,.2);
  transition:.3s;
  z-index:1002;
}
.sidebar.active{right:0}
.sidebar a{
  display:block;
  margin:12px 0;
  padding:12px;
  background:#8b0000;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
  text-align:center;
}

/* المحتوى */
.container{
  max-width:800px;
  margin:80px auto 20px;
  background:#fff;
  padding:20px;
  border-radius:10px;
}
h2{text-align:center;color:#8b0000}
label{display:block;margin-top:12px;font-weight:bold}
input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
}
.row{display:flex;gap:10px}
.row>div{flex:1}

#logoBox{text-align:center;margin:10px 0}
#logoBox img{max-width:150px;display:none}

button.submit{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:#8b0000;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
  #sendingModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.sending-box{
  background:#fff;
  padding:30px 25px;
  border-radius:16px;
  text-align:center;
  width:260px;
  animation:scaleIn .3s ease;
}

@keyframes scaleIn{
  from{transform:scale(.8);opacity:0}
  to{transform:scale(1);opacity:1}
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #eee;
  border-top:4px solid #8b0000;
  border-radius:50%;
  margin:0 auto 15px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

#countdownText{
  font-size:15px;
  margin-bottom:8px;
  color:#333;
}

.zikr{
  font-size:16px;
  color:#8b0000;
  font-weight:bold;
  animation:fade 1.5s infinite;
}

@keyframes fade{
  0%,100%{opacity:1}
  50%{opacity:.4}
}
#msg{
  transition:opacity .5s ease;
}
  .whatsapp-top{  
  position:fixed;  
top:60px;                    
  left:12px;  
  width:48px;  
  height:48px;  
  background:#25D366;  
  color:#fff;  
  border-radius:50%;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  font-size:28px;  
  z-index:13000;  
}  
</style>
</head>

<body>
 <a href="https://wa.me/213674141379" target="_blank" class="whatsapp-top">  
<i class="fab fa-whatsapp"></i>  
</a>  
<button class="menu-btn" onclick="openMenu()">☰</button>
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a href="index.html">🏠 الرئيسية</a>
  <a href="results-gen.html">🔍 العروض</a>
  <a href="edit-offer.html">✏️ تعديل او حدف العروض</a>
</div>

<div class="container">
<h2>📋 إدراج عرض عمرة</h2>

<form id="offerForm">

<label>الوكالة</label>
<select id="agencySelect">
  <option value="">اختر وكالة</option>
  <option value="__new__">➕ وكالة جديدة</option>
</select>

<div id="logoBox">
  <img id="agencyLogo">
</div>

<label>اسم الوكالة</label>
<input name="agency" id="agencyInput" required>

<div class="row">
  <div>
    <label>الولاية</label>
    <input name="state" id="stateInput" required>
  </div>
  <div>
    <label>البلدية</label>
    <input name="city" id="cityInput" required>
  </div>
</div>

<div id="phoneBox">
  <label>رقم الهاتف</label>
  <input name="phone" id="phoneInput" required>
</div>


<hr>

<label>اسم العرض</label>
<input name="offer" required>

<div class="row">
  <div>
    <label>تاريخ الرحلة</label>
    <input type="date" name="date" required>
  </div>
  <div>
    <label>المدة</label>
    <input name="duration" required>
  </div>
</div>

<label>نوع الرحلة</label>
<select name="flightType" required>
  <option value="">اختر</option>
  <option>مباشرة</option>
  <option>غير مباشرة</option>
</select>

<label>مطار الإقلاع</label>
<select name="airport" required>
  <option value="">اختر مطار الإقلاع</option>
  <option>مطار الجزائر</option>
  <option>مطار وهران</option>
  <option>مطار قسنطينة</option>
  <option>مطار عنابة</option>
  <option>مطار جيجل</option>
  <option>مطار باتنة</option>
  <option>مطار ورقلة</option>
  <option>مطار تمنغاست</option>
  <option>مطار أدرار</option>
  <option>مطار الوادي</option>
  <option>مطار غرداية</option>
  <option>مطار تلمسان</option>
</select>
<label>شركة الطيران</label>
<select name="airline" id="airlineSelect" required>
  
  <option value="">اختر شركة الطيران</option>
  <option value="الخطوط الجوية الجزائرية" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769278796/t%C3%A9l%C3%A9chargement_xi0dob.jpg">الخطوط الجوية الجزائرية</option>
  <option value="الخطوط الجوية الأردنية" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769285030/t%C3%A9l%C3%A9chargement_1_ocn0g5.jpg">الخطوط الجوية الأردنية</option>
  <option value="الخطوط الجوية السعودية" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769279850/250px-%D8%B4%D8%B9%D8%A7%D8%B1_%D8%A7%D9%84%D8%AE%D8%B7%D9%88%D8%B7_%D8%A7%D9%84%D8%B3%D8%B9%D9%88%D8%AF%D9%8A%D8%A9.svg_jmmkls.png">الخطوط الجوية السعودية</option>
  <option value="الخطوط الجوية التركية" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769279151/t%C3%A9l%C3%A9chargement_rwei2l.png">الخطوط الجوية التركية</option>
  <option value="فلاي ناس" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769498878/ei_1769203319297-removebg-preview_hhslho.png">فلاي ناس</option>
  <option value="نوفلار" data-logo="https://i.supaimg.com/7c39556f-f3bb-4475-b7a7-bd278b555927.png">نوفلار</option>
  <option value="الخطوط الجوية الإماراتية" data-logo="https://upload.wikimedia.org/wikipedia/commons/d/d0/Emirates_logo.svg">الخطوط الجوية الإماراتية</option>
  <option value="الخطوط الجوية القطرية" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769279819/images_3_afxklx.jpg">الخطوط الجوية القطرية</option>
    <option value="الخطوط الجوية المصرية" data-logo="https://i.supaimg.com/7862dbb4-97fd-4a1d-aa23-ccb4eac316c8.png">الخطوط الجوية المصرية</option>
   <option value="طيران أديل السعودي" data-logo="https://i.ibb.co/GzhC6vQ/t-l-chargement-removebg-preview.png">طيران أديل السعودي</option>
 <option value="طيران اجات" data-logo="https://res.cloudinary.com/dmc36nijl/image/upload/v1769945057/t%C3%A9l%C3%A9chargement_1_cnns6z.png">طيران اجات</option>
</select>

<input type="hidden" name="airlineLogo" id="airlineLogoInput">

<div id="airlineLogoBox" style="text-align:center;margin-top:10px">
  <img id="airlineLogo" style="max-width:160px;display:none">
</div>
<div class="row">
  <div><input name="group" placeholder="جماعية"></div>
</div>
<div class="row">
  <div><input name="four" placeholder="رباعية"></div>
  <div><input name="three" placeholder="ثلاثية"></div>
</div>

<input name="two" placeholder="ثنائية">
<input name="hotel" placeholder="اسم الفندق" required>

<button class="submit">🚀 نشر العرض</button>
<p id="msg" style="text-align:center"></p>

</form>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbx7sQEUTNhglETA_Irkc5UOvy62SvS-9ftS4v-Ugh8cnTQjDiNs6-kp-SdR8QsOnXE-zw/exec";

const agencySelect=document.getElementById("agencySelect");
const agencyInput=document.getElementById("agencyInput");
const stateInput=document.getElementById("stateInput");
const cityInput=document.getElementById("cityInput");
const phoneInput=document.getElementById("phoneInput");
const logo=document.getElementById("agencyLogo");
const form=document.getElementById("offerForm");
const msg=document.getElementById("msg");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

let agencies={};

fetch(API).then(r=>r.json()).then(data=>{
  data.forEach(o=>{
    if(!agencies[o.agency]){
      agencies[o.agency]=o;
      agencySelect.innerHTML+=`<option value="${o.agency}">${o.agency}</option>`;
    }
  });
});

const phoneBox = document.getElementById("phoneBox");

agencySelect.onchange = () => {
  const v = agencySelect.value;

  if (v === "__new__") {
    // وكالة جديدة → إظهار الهاتف
    agencyInput.value = "";
    stateInput.value = "";
    cityInput.value = "";
    phoneInput.value = "";
    phoneBox.style.display = "block";
    logo.style.display = "none";

  } else if (agencies[v]) {
    // وكالة موجودة → إخفاء الهاتف
    agencyInput.value = v;
    stateInput.value = agencies[v].state;
    cityInput.value = agencies[v].city;

    phoneInput.value = agencies[v].phone || "";
    phoneBox.style.display = "none"; // 🔒 إخفاء الرقم

    if (agencies[v].logo) {
      logo.src = agencies[v].logo;
      logo.style.display = "block";
    } else {
      logo.style.display = "none";
    }
  }
};


form.onsubmit = e => {
  e.preventDefault();

  // تأكيد تعبئة شعار شركة الطيران
  if (!airlineLogoInput.value) {
    const option = airlineSelect.options[airlineSelect.selectedIndex];
    const logoUrl = option ? option.getAttribute("data-logo") : "";
    airlineLogoInput.value = logoUrl || "";
  }

  // إظهار نافذة الإرسال
  const modal = document.getElementById("sendingModal");
  const countdownText = document.getElementById("countdownText");
  let time = 5;

  modal.style.display = "flex";
  countdownText.textContent = `⏳ يتم الإرسال... ${time}`;

  const timer = setInterval(() => {
    time--;
    countdownText.textContent = `⏳ يتم الإرسال... ${time}`;
    if (time === 0) clearInterval(timer);
  }, 1000);

  msg.textContent = "";

  fetch(API, {
    method: "POST",
    body: new FormData(form)
  })
  .then(() => {
    // إخفاء نافذة الإرسال
    setTimeout(() => {
      modal.style.display = "none";

      // رسالة النجاح
      msg.style.opacity = "1";
      msg.style.color = "green";
      msg.textContent = "✅ تم نشر العرض بنجاح";

      // إخفاء الرسالة بعد 4 ثوانٍ
      setTimeout(() => {
        msg.style.opacity = "0";
        setTimeout(() => {
          msg.textContent = "";
          msg.style.opacity = "1";
        }, 500);
      }, 4000);

    }, 5000); // نفس مدة العد التنازلي
  })
  .catch(() => {
    modal.style.display = "none";
    msg.style.color = "red";
    msg.textContent = "❌ خطأ في الإرسال";
  });
};

function openMenu(){
  sidebar.classList.add("active");
  overlay.classList.add("active");
}
function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}


const airlineSelect = document.getElementById("airlineSelect");
const airlineLogo = document.getElementById("airlineLogo");
const airlineLogoInput = document.getElementById("airlineLogoInput");

airlineSelect.addEventListener("change", () => {
  const option = airlineSelect.options[airlineSelect.selectedIndex];
  const logoUrl = option.getAttribute("data-logo");

  if (logoUrl && logoUrl.trim() !== "") {
    airlineLogo.src = logoUrl;
    airlineLogo.style.display = "block";
    airlineLogoInput.value = logoUrl; // ✅ هذا هو المهم
  } else {
    airlineLogo.style.display = "none";
    airlineLogo.src = "";
    airlineLogoInput.value = "";
  }
});


</script>
<!-- نافذة الإرسال -->
<div id="sendingModal" style="display:none;">
  <div class="sending-box">
    <div class="spinner"></div>
    <p id="countdownText">⏳ يتم الإرسال... 5</p>
    <p class="zikr">🤍 استغفر الله</p>
  </div>
</div>

</body>
</html>
