<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العروض المناسبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --crimson:   #8b0000;
    --crimson-d: #5c0000;
    --crimson-l: #b71c1c;
    --gold:      #c9a84c;
    --gold-l:    #f0d080;
    --teal:      #00695c;
    --teal-l:    #00897b;
    --ink:       #1a1a1a;
    --muted:     #6b6b6b;
    --surface:   #fdfaf5;
    --card:      #ffffff;
    --border:    #e8e0d0;
  }

  body {
    font-family: 'Tajawal', Arial, sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, var(--crimson-d), var(--crimson), var(--crimson-l));
    color: #fff;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 500;
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header-title { font-size: 17px; font-weight: 700; }
  .header-title small { display: block; font-size: 11px; font-weight: 300; color: var(--gold-l); margin-top: 2px; }
  .menu-btn {
    background: rgba(255,255,255,.15);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 40px; height: 40px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .menu-btn:hover { background: rgba(255,255,255,.25); }
  .general-link {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 20px;
    transition: background .2s;
  }
  .general-link:hover { background: rgba(255,255,255,.25); }

  /* ─── SIDEBAR ─── */
  .sidebar {
    position: fixed;
    top: 0; right: -300px;
    width: 280px;
    height: 100%;
    background: var(--card);
    box-shadow: -6px 0 24px rgba(0,0,0,.15);
    transition: right .3s ease;
    z-index: 1000;
    overflow-y: auto;
  }
  .sidebar.active { right: 0; }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 999;
  }
  .sidebar-overlay.active { display: block; }
  .sidebar-header {
    background: linear-gradient(135deg, var(--crimson-d), var(--crimson));
    color: #fff;
    padding: 20px 16px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h3 { font-size: 16px; font-weight: 700; }
  .close-btn {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-body { padding: 16px; }
  .info-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .info-row .label { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
  .info-row .val { font-weight: 600; }

  /* ─── MAIN ─── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 14px 50px;
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 18px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stats-bar .label { font-size: 13px; color: var(--muted); }
  .stats-bar .count { font-size: 20px; font-weight: 900; color: var(--crimson); }

  /* ─── OFFER CARD ─── */
  .card {
    background: var(--card);
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 14px rgba(0,0,0,.05);
    margin-bottom: 16px;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.1); }

  .card-top {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .agency-logo {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    object-fit: contain;
    background: #f5f5f5;
    border: 1px solid var(--border);
    padding: 4px;
    flex-shrink: 0;
  }
  .agency-logo-placeholder {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--crimson), var(--crimson-l));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .card-meta .offer-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .card-meta .agency-name {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-state { background: #fff3e0; color: #e65100; }

  .card-body { padding: 14px 16px; }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .info-item { font-size: 13px; }
  .info-item .icon-lbl { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
  .info-item .icon-val { font-weight: 600; }

  /* airline strip */
  .airline-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f8f5f0;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .airline-strip img {
    height: 32px;
    width: auto;
    max-width: 70px;
    object-fit: contain;
  }
  .airline-strip .airline-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .airline-strip .airline-sub  { font-size: 11px; color: var(--muted); }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .price-box .price-lbl { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .price-box .price-val { font-size: 20px; font-weight: 900; color: var(--crimson); }
  .price-box .price-currency { font-size: 13px; font-weight: 400; color: var(--muted); }

  .card-btns { display: flex; gap: 8px; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-family: 'Tajawal', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-outline {
    background: #f0ebe3;
    color: var(--ink);
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--crimson), var(--crimson-l));
    color: #fff;
    box-shadow: 0 3px 10px rgba(139,0,0,.25);
  }
  .btn-primary:hover { box-shadow: 0 5px 16px rgba(139,0,0,.35); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 56px; margin-bottom: 14px; }
  .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* ─── MODAL ─── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 2000;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 580px;
    padding: 24px 20px 32px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-close {
    float: left;
    background: #f0ebe3;
    border: none;
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-row .dk { color: var(--muted); }
  .detail-row .dv { font-weight: 700; }
  .modal-confirm-btn {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--teal), var(--teal-l));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Tajawal', Arial, sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,105,92,.3);
    transition: box-shadow .2s;
  }
  .modal-confirm-btn:hover { box-shadow: 0 6px 20px rgba(0,105,92,.4); }

  /* ─── LOADER ─── */
  #loader {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 3000;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
    gap: 12px;
  }
  #loader.show { display: flex; }
  .loader-spin {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── TOAST ─── */
  #toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 50px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    z-index: 4000;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateX(-50%) translateY(10px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width:500px) {
    .info-grid { grid-template-columns: 1fr; }
    .card-footer { flex-direction: column; align-items: flex-start; }
    .card-btns .btn { padding: 10px 14px; }
  }
</style>
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>👤 بيانات المعتمر</h3>
    <button class="close-btn" onclick="toggleSidebar()">✕</button>
  </div>
  <div class="sidebar-body" id="userBox">
    <div style="text-align:center;padding:30px;color:var(--muted)">⏳ جارٍ التحميل…</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="header-title">
      🕋 العروض المناسبة
      <small>نتائج مخصصة لرحلتك</small>
    </div>
    <a class="general-link" href="results-gen.html">📋 عامة</a>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div class="stats-bar" id="statsBar" style="display:none">
    <div>
      <div class="label">العروض المتاحة لرحلتك</div>
      <div class="count" id="countNum">0</div>
    </div>
    <div style="font-size:22px">🎯</div>
  </div>

  <div id="offers">
    <div class="empty-state">
      <div class="big">⏳</div>
      <h3>جارٍ تحميل العروض…</h3>
      <p>يرجى الانتظار</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>📋 تفاصيل العرض</h3>
    <div id="modalContent"></div>
    <button class="modal-confirm-btn" onclick="sendConfirmed()">
      📩 تأكيد التسجيل
    </button>
  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-spin"></div>
  جارٍ إرسال الطلب…
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const SEARCH_API = "https://script.google.com/macros/s/AKfycbwsZZ1jb1b-BIUviU2j2bpZ-Av7NGoB67bvAY2ZnFFM6kQ6nPcqFPZ7EWExDFGYqYTP/exec";
const OFFERS_API = "https://script.google.com/macros/s/AKfycbwN-Mgn61HDqdCD2_shOx3nRAcW-O8GxquhSpxaSX0Az00W1W_48lVFCowDqF41ZN_7dQ/exec";
const MAIL_API   = "https://script.google.com/macros/s/AKfycbwXHAcgydulctkjJEM2To647tVaAf8zJgbxjmiRAUKlhR4sSPFH8qWrddSLm84zD3A/exec";

const phone    = localStorage.getItem("umrah_phone");
let userData   = null;
let offersData = [];
let selectedOffer = null;

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("sidebarOverlay").classList.toggle("active");
}

function diffDays(d1, d2) {
  return Math.abs((new Date(d1) - new Date(d2)) / (1000 * 60 * 60 * 24));
}

function formatDate(d) {
  if (!d) return "-";
  return new Date(d).toLocaleDateString("ar-DZ", { year: "numeric", month: "long", day: "numeric" });
}

function showToast(msg, ok = true) {
  const t = document.getElementById("toast");
  t.style.background = ok ? "#2e7d32" : "#c62828";
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3500);
}

/* ─── Load User ─── */
if (!phone) {
  document.getElementById("userBox").innerHTML = `
    <div style="text-align:center;padding:20px;color:#c62828;font-size:14px">
      ❌ لم يتم تسجيل الدخول<br>
      <a href="index.html" style="color:var(--crimson);font-weight:700">الرجوع للصفحة الرئيسية</a>
    </div>`;
  document.getElementById("offers").innerHTML = `
    <div class="empty-state">
      <div class="big">🔒</div>
      <h3>غير مصرح</h3>
      <p>يرجى تسجيل الدخول أولاً من <a href="index.html" style="color:var(--crimson)">هنا</a></p>
    </div>`;
} else {
  fetch(SEARCH_API + "?phone=" + encodeURIComponent(phone))
    .then(r => r.json())
    .then(d => {
      if (d && d.found) {
        userData = d;
        renderSidebar(d);
        renderOffers();
      } else {
        document.getElementById("userBox").innerHTML = `<div style="color:#c62828;text-align:center;padding:20px;font-size:13px">❌ لم يتم العثور على البيانات</div>`;
      }
    })
    .catch(() => {
      document.getElementById("userBox").innerHTML = `<div style="color:#c62828;text-align:center;padding:20px;font-size:13px">❌ خطأ في الاتصال</div>`;
    });

  fetch(OFFERS_API)
    .then(r => r.json())
    .then(d => {
      offersData = d || [];
      renderOffers();
    });
}

function renderSidebar(d) {
  const rows = [
    ["📞", "الهاتف",       d.phone],
    ["✈️", "المطار",       d.airport],
    ["🏨", "الفندق",       d.hotel],
    ["⏱️", "المدة",        d.duration],
    ["🛏️", "الغرفة",       d.room],
    ["🗺️", "المسار",       d.route],
    ["✈️", "نوع الرحلة",   d.flight],
    ["🏠", "الولاية",      d.residence],
    ["📅", "تاريخ الإقلاع",formatDate(d.travel_date)],
  ];

  const html = `
    <div style="text-align:center;padding:16px 0 12px">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--crimson-d),var(--crimson));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px">🕌</div>
      <div style="font-weight:700;font-size:16px">${d.name} ${d.lastname}</div>
    </div>
    ${rows.map(([ic, lbl, val]) => `
      <div class="info-row">
        <span class="icon">${ic}</span>
        <div><div class="label">${lbl}</div><div class="val">${val || "-"}</div></div>
      </div>`).join("")}
    ${d.note ? `<div style="margin-top:12px;font-size:12px;background:#f8f5f0;border-radius:10px;padding:10px"><b>📝 ملاحظة:</b><br>${d.note}</div>` : ""}
  `;
  document.getElementById("userBox").innerHTML = html;
}

function isMatching(o) {
  if (!userData) return false;
  const airportMatch = o.airport &&
    userData.airport &&
    (o.airport.includes(userData.airport) || userData.airport.includes(o.airport));
  const dateClose = o.date && userData.travel_date &&
    diffDays(userData.travel_date, o.date) <= 10;
  return airportMatch && dateClose;
}

function renderOffers() {
  if (!userData || !offersData.length) return;

  const list = offersData.filter(isMatching);
  const offersBox = document.getElementById("offers");

  if (!list.length) {
    offersBox.innerHTML = `
      <div class="empty-state">
        <div class="big">😔</div>
        <h3>لا توجد عروض مناسبة</h3>
        <p>لم نجد عروضاً تطابق مطارك وتاريخ رحلتك حالياً<br>تفقد <a href="results-gen.html" style="color:var(--crimson);font-weight:700">العروض العامة</a></p>
      </div>`;
    return;
  }

  document.getElementById("statsBar").style.display = "flex";
  document.getElementById("countNum").innerText = list.length;

  offersBox.innerHTML = list.map(o => cardHTML(o)).join("");
}

function cardHTML(o) {
  const logoHTML = o.logo
    ? `<img class="agency-logo" src="${o.logo}" onerror="this.parentNode.innerHTML='<div class=agency-logo-placeholder>🏢</div>'">`
    : `<div class="agency-logo-placeholder">🏢</div>`;

  const airlineHTML = (o.airlineLogo || o.airline) ? `
    <div class="airline-strip">
      ${o.airlineLogo ? `<img src="${o.airlineLogo}" onerror="this.style.display='none'" alt="airline">` : ""}
      <div>
        <div class="airline-name">${o.airline || ""}</div>
        <div class="airline-sub">الناقل الجوي</div>
      </div>
    </div>` : "";

  const data = JSON.stringify(o).replace(/'/g, "&#39;");

  return `
    <div class="card">
      <div class="card-top">
        ${logoHTML}
        <div class="card-meta">
          <div class="offer-name">${o.offer || "عرض عمرة"}</div>
          <div class="agency-name">
            🏢 ${o.agency || "-"}
            &nbsp;·&nbsp;
            <span class="badge badge-state">${o.state || "-"}</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <div class="icon-lbl">📅 تاريخ الانطلاق</div>
            <div class="icon-val">${formatDate(o.date)}</div>
          </div>
          <div class="info-item">
            <div class="icon-lbl">⏱️ مدة الرحلة</div>
            <div class="icon-val">${o.duration || "-"}</div>
          </div>
          <div class="info-item">
            <div class="icon-lbl">🏨 الفندق</div>
            <div class="icon-val">${o.hotel || "-"}</div>
          </div>
          <div class="info-item">
            <div class="icon-lbl">🛫 المسار</div>
            <div class="icon-val">${o.flight || "-"}</div>
          </div>
        </div>
        ${airlineHTML}
        <div class="card-footer">
          <div class="price-box">
            <div class="price-lbl">السعر للفرد</div>
            <div class="price-val">${Number(o.group || 0).toLocaleString("ar-DZ")} <span class="price-currency">دج</span></div>
          </div>
          <div class="card-btns">
            <button class="btn btn-outline" onclick='openDetails(${data})'>ℹ️ التفاصيل</button>
            <button class="btn btn-primary" onclick='openDetails(${data})'>📩 تسجيل</button>
          </div>
        </div>
      </div>
    </div>`;
}

function openDetails(o) {
  selectedOffer = o;
  document.getElementById("modalContent").innerHTML = `
    <div class="detail-row"><span class="dk">🕋 العرض</span><span class="dv">${o.offer || "-"}</span></div>
    <div class="detail-row"><span class="dk">🏢 الوكالة</span><span class="dv">${o.agency || "-"}</span></div>
    <div class="detail-row"><span class="dk">📍 الولاية</span><span class="dv">${o.state || "-"}</span></div>
    <div class="detail-row"><span class="dk">✈️ المطار</span><span class="dv">${o.airport || "-"}</span></div>
    <div class="detail-row"><span class="dk">📅 تاريخ الانطلاق</span><span class="dv">${formatDate(o.date)}</span></div>
    <div class="detail-row"><span class="dk">🏨 الفندق</span><span class="dv">${o.hotel || "-"}</span></div>
    <div class="detail-row"><span class="dk">⏱️ المدة</span><span class="dv">${o.duration || "-"}</span></div>
    <div class="detail-row"><span class="dk">🛫 مسار الرحلة</span><span class="dv">${o.flight || "-"}</span></div>
    <div class="detail-row"><span class="dk">💰 السعر</span><span class="dv" style="color:var(--crimson);font-size:16px">${Number(o.group || 0).toLocaleString("ar-DZ")} دج</span></div>
  `;
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

// Close modal on background click
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function sendConfirmed() {
  if (!userData || !selectedOffer) return;
  document.getElementById("loader").classList.add("show");

  const url = MAIL_API +
    "?customer=" + encodeURIComponent(JSON.stringify(userData)) +
    "&offer=" + encodeURIComponent(JSON.stringify(selectedOffer));

  fetch(url)
    .then(() => {
      document.getElementById("loader").classList.remove("show");
      closeModal();
      showToast("✅ تم إرسال طلب التسجيل بنجاح");
    })
    .catch(() => {
      document.getElementById("loader").classList.remove("show");
      showToast("❌ فشل الإرسال، يرجى المحاولة مجدداً", false);
    });
}
</script>
</body>
</html>
