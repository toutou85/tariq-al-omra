<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تفاصيل العرض | طريق العمرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --gold:        #C49A2A;
  --gold-light:  #F5E199;
  --gold-pale:   #FBF5DC;
  --green:       #1A7A4A;
  --green-light: #E6F5EE;
  --red:         #C0392B;
  --ink:         #1C1C2E;
  --muted:       #6B6B80;
  --border:      #E8E0CC;
  --surface:     #FDFAF3;
  --white:       #FFFFFF;
  --shadow-sm:   0 2px 8px rgba(28,28,46,.07);
  --shadow-md:   0 6px 24px rgba(28,28,46,.12);
  --radius:      14px;
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--surface);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.7;
  padding-bottom: 160px;
}

/* ══════════════════════════════════════════
   TOP BAR
══════════════════════════════════════════ */
.topbar {
  position: sticky;
  top: 0;
  z-index: 900;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  height: 58px;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}

.topbar-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.topbar-title span:first-child {
  font-size: 13px;
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.5px;
}

.topbar-title span:last-child {
  font-size: 11px;
  color: rgba(255,255,255,.5);
  font-weight: 400;
}

.menu-btn {
  width: 40px;
  height: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  border-radius: 10px;
  transition: background .2s;
}
.menu-btn:hover { background: rgba(255,255,255,.08); }
.menu-btn span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: .3s;
}

.topbar-logo {
  width: 36px;
  height: 36px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: 0;
  right: -300px;
  width: 275px;
  height: 100%;
  background: var(--white);
  z-index: 2000;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -6px 0 30px rgba(0,0,0,.18);
}

.sidebar.open { right: 0; }

.sidebar-header {
  background: var(--ink);
  padding: 20px 18px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header-title {
  color: var(--gold-light);
  font-weight: 900;
  font-size: 16px;
}

.close-btn {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--white);
  font-size: 18px;
  transition: background .2s;
}
.close-btn:hover { background: rgba(255,255,255,.22); }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }

.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 20px;
  text-decoration: none;
  color: var(--ink);
  font-weight: 600;
  font-size: 14.5px;
  transition: background .15s, color .15s;
  border-right: 3px solid transparent;
}

.sidebar-nav a:hover {
  background: var(--gold-pale);
  color: var(--gold);
  border-right-color: var(--gold);
}

.sidebar-nav a .nav-icon {
  font-size: 18px;
  width: 26px;
  text-align: center;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 18px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 1500;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
  backdrop-filter: blur(3px);
}
.overlay.show { opacity: 1; pointer-events: all; }

/* ══════════════════════════════════════════
   MAIN CONTAINER
══════════════════════════════════════════ */
.container {
  max-width: 860px;
  margin: 24px auto;
  padding: 0 14px;
}

/* ══════════════════════════════════════════
   HERO CARD
══════════════════════════════════════════ */
.hero-card {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}

.hero-img-wrap {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: hidden;
}

.hero-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .5s ease;
}

.hero-img-wrap:hover img { transform: scale(1.03); }

.hero-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  background: var(--gold);
  color: var(--ink);
  font-weight: 900;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

.hero-body {
  padding: 20px 20px 16px;
}

.agency-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.agency-logo-wrap {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  background: var(--gold-pale);
  border: 2px solid var(--gold-light);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.agency-logo-wrap img {
  width: 44px;
  height: 44px;
  object-fit: contain;
}

.agency-info { flex: 1; }
.agency-label { font-size: 11px; color: var(--muted); font-weight: 500; }
.agency-name { font-size: 16px; font-weight: 900; color: var(--ink); }

.offer-title {
  font-size: 20px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 14px;
}

.tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--gold-pale);
  border: 1px solid var(--gold-light);
  color: var(--gold);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
}

/* ══════════════════════════════════════════
   SECTION CARD
══════════════════════════════════════════ */
.section-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
  overflow: hidden;
}

.section-head {
  padding: 14px 18px;
  background: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-head-icon {
  font-size: 18px;
}

.section-head-title {
  font-size: 14px;
  font-weight: 900;
  color: var(--gold-light);
  letter-spacing: 0.3px;
}

.detail-list { padding: 6px 0; }

.detail-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 18px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}

.detail-row:last-child { border-bottom: none; }
.detail-row:hover { background: var(--gold-pale); }

.detail-icon { font-size: 17px; flex-shrink: 0; width: 26px; text-align: center; }

.detail-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  min-width: 100px;
  flex-shrink: 0;
}

.detail-value {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  flex: 1;
  text-align: left;
}

/* ══════════════════════════════════════════
   PRICES
══════════════════════════════════════════ */
.prices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

.price-cell {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.price-cell:nth-child(odd) { border-left: none; }

.price-cell:nth-last-child(-n+2) { border-bottom: none; }

.price-type {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

.price-amount {
  font-size: 18px;
  font-weight: 900;
  color: var(--green);
}

.price-amount span {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}

/* ══════════════════════════════════════════
   CHILDREN PRICES
══════════════════════════════════════════ */
.children-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px;
}

.child-card {
  background: var(--green-light);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.child-age {
  font-size: 11px;
  color: var(--green);
  font-weight: 700;
  margin-bottom: 4px;
}

.child-price {
  font-size: 16px;
  font-weight: 900;
  color: var(--ink);
}

.child-price sub {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
}

/* ══════════════════════════════════════════
   PHOTO GALLERY
══════════════════════════════════════════ */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  padding: 3px;
}

.gallery-grid img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  cursor: pointer;
  transition: opacity .2s;
}

.gallery-grid img:hover { opacity: .85; }

.gallery-grid img:first-child {
  grid-column: span 2;
  height: 160px;
}

/* ══════════════════════════════════════════
   LIKE COUNT
══════════════════════════════════════════ */
.engagement-bar {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.like-count-display {
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
}

.like-count-num {
  font-weight: 900;
  color: var(--red);
}

/* ══════════════════════════════════════════
   LOADING / ERROR
══════════════════════════════════════════ */
.state-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
  gap: 16px;
}

.loader {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.state-text { color: var(--muted); font-size: 15px; font-weight: 600; }

/* ══════════════════════════════════════════
   ACTION BAR (BOTTOM)
══════════════════════════════════════════ */
.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  gap: 10px;
  z-index: 800;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
}

.btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 12px 10px;
  border: none;
  border-radius: 12px;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  transition: transform .15s, opacity .15s, box-shadow .15s;
}

.btn:active { transform: scale(.97); }

.btn-like {
  background: #FFF0F0;
  color: var(--red);
  border: 1.5px solid #FFCDD2;
}

.btn-like.liked {
  background: var(--red);
  color: var(--white);
  border-color: var(--red);
}

.btn-like.disabled { opacity: .5; pointer-events: none; }

.btn-share {
  background: var(--ink);
  color: var(--white);
  box-shadow: 0 3px 10px rgba(28,28,46,.2);
}

.btn-share:hover { box-shadow: 0 5px 18px rgba(28,28,46,.3); }

/* ══════════════════════════════════════════
   BOOK BUTTON
══════════════════════════════════════════ */
.book-btn-wrap {
  position: fixed;
  bottom: 82px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 850;
}

.book-btn {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--green) 0%, #27AE60 100%);
  color: var(--white);
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  box-shadow: 0 6px 22px rgba(26,122,74,.4);
  white-space: nowrap;
  animation: pulse-green 2.5s infinite;
  font-family: 'Tajawal', sans-serif;
}

@keyframes pulse-green {
  0%   { box-shadow: 0 0 0 0 rgba(26,122,74,.5); }
  70%  { box-shadow: 0 0 0 16px rgba(26,122,74,0); }
  100% { box-shadow: 0 0 0 0 rgba(26,122,74,0); }
}

/* ══════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════ */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}

.lightbox.show { opacity: 1; pointer-events: all; }

.lightbox img {
  max-width: 95vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  left: 20px;
  color: var(--white);
  font-size: 28px;
  cursor: pointer;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.12);
  border-radius: 50%;
  transition: background .2s;
}

.lightbox-close:hover { background: rgba(255,255,255,.25); }

@media (prefers-reduced-motion: reduce) {
  .book-btn { animation: none; }
}
</style>
</head>

<body>

<!-- ══ TOP BAR ══ -->
<header class="topbar">
  <div class="menu-btn" onclick="openSidebar()" role="button" aria-label="فتح القائمة">
    <span></span><span></span><span></span>
  </div>
  <div class="topbar-title">
    <span>طريق العمرة</span>
    <span>تفاصيل العرض</span>
  </div>
  <div class="topbar-logo">🕋</div>
</header>

<!-- ══ OVERLAY ══ -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<nav id="mySidebar" class="sidebar" aria-label="القائمة الرئيسية">
  <div class="sidebar-header">
    <span class="sidebar-header-title">🕋 طريق العمرة</span>
    <div class="close-btn" onclick="closeSidebar()" role="button" aria-label="إغلاق">✕</div>
  </div>
  <div class="sidebar-nav">
    <a href="index.html"><span class="nav-icon">🏠</span> الرئيسية</a>
    <a href="offers.html"><span class="nav-icon">🎁</span> عروض العمرة</a>
    <div class="sidebar-divider"></div>
    <a href="hajj-space.html"><span class="nav-icon">🕋</span> فضاء الحج 1447</a>
    <a href="reviews.html"><span class="nav-icon">💬</span> آراء المعتمرين</a>
    <a href="achievements.html"><span class="nav-icon">🏅</span> إنجازاتنا</a>
    <div class="sidebar-divider"></div>
    <a href="upload.html"><span class="nav-icon">📤</span> تحميل جواز السفر</a>
    <a href="space.html"><span class="nav-icon">🧾</span> تسجيلاتي</a>
    <a href="join.html"><span class="nav-icon">📩</span> انضم إلينا</a>
    <a href="manha.html"><span class="nav-icon">💶</span> منحة سفر</a>
    <div class="sidebar-divider"></div>
    <a href="contact.html"><span class="nav-icon">📞</span> اتصل بنا</a>
    <a href="about.html"><span class="nav-icon">❔</span> من نحن</a>
  </div>
</nav>

<!-- ══ MAIN ══ -->
<main class="container" id="details-container">
  <div class="state-container">
    <div class="loader"></div>
    <p class="state-text">جاري تحميل التفاصيل…</p>
  </div>
</main>

<!-- ══ BOOK BUTTON ══ -->
<div class="book-btn-wrap">
  <a id="fixedBookBtn" class="book-btn" href="#">
    ✅ احجز الآن
  </a>
</div>


<!-- ══ ACTION BAR ══ -->
<div class="action-bar">
  <button id="likeBtn" class="btn btn-like" onclick="likeOffer()">
    ❤️ إعجاب &nbsp;<span id="like-count-bar">0</span>
  </button>
  <button class="btn btn-share" onclick="shareOffer()">
    📤 مشاركة
  </button>
</div>

<!-- ══ LIGHTBOX ══ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxQ0REua6idTYcmfcjhD4IcbHM9k25YsTlqnWkVLRjLe0VKI-4BDIAvXzb6EviLJz7E/exec";
const id = new URLSearchParams(location.search).get("id");
let currentOffer = null;

/* ── SIDEBAR ── */
const sidebar = document.getElementById("mySidebar");
const overlay = document.getElementById("overlay");
function openSidebar()  { sidebar.classList.add("open");  overlay.classList.add("show");  document.body.style.overflow="hidden"; }
function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("show"); document.body.style.overflow=""; }

/* ── LOGO MAP ── */
function normalize(t) {
  return String(t).toLowerCase().replace(/[إأآ]/g,"ا").replace(/ة/g,"ه");
}
function getAgencyLogo(name) {
  const n = normalize(name);
  if (n.includes("تقرت"))  return "https://i.ibb.co/2XWLPsc/1766858356356-removebg-preview.png";
  if (n.includes("انسية")) return "https://i.ibb.co/Mk97KqGK/FB-IMG-1766861138141-removebg-preview.png";
  if (n.includes("سقيف"))  return "https://i.ibb.co/mmrx9QG/FB-IMG-1766861105309-removebg-preview.png";
  return "";
}

function fmt(v) {
  return v ? String(v).trim() : "—";
}

/* ── LOAD ── */
fetch(apiURL).then(r => r.json()).then(data => {
  currentOffer = data.find(o => String(o.ID) === String(id));
  const c = document.getElementById("details-container");

  if (!currentOffer) {
    c.innerHTML = `
      <div class="state-container">
        <p style="font-size:48px">🔍</p>
        <p class="state-text" style="color:var(--red)">العرض غير موجود أو تم حذفه</p>
        <a href="offers.html" style="color:var(--gold);font-weight:900;text-decoration:none;margin-top:8px">← العودة للعروض</a>
      </div>`;
    return;
  }

  const logo = getAgencyLogo(currentOffer["الوكالة"]);
  const likes = currentOffer.likes || 0;

  /* update like bar */
  document.getElementById("like-count-bar").textContent = likes;

  /* extra images */
  const extras = [
    currentOffer['رابطصورة 2'],
    currentOffer['رابط صورة 3'],
    currentOffer['بط صورة 4'],
    currentOffer['رابط صورة 5'],
    currentOffer['رابط صورة 6'],
  ].filter(Boolean);

  const galleryHTML = extras.length ? `
    <div class="section-card">
      <div class="section-head">
        <span class="section-head-icon">🖼️</span>
        <span class="section-head-title">معرض الصور</span>
      </div>
      <div class="gallery-grid">
        ${extras.map(src => `<img src="${src}" alt="" onclick="openLightbox('${src}')" loading="lazy">`).join("")}
      </div>
    </div>` : "";

  c.innerHTML = `
    <!-- HERO -->
    <div class="hero-card">
      <div class="hero-img-wrap">
        <img src="${fmt(currentOffer['رابط صورة الفندق'])}" alt="${fmt(currentOffer['اسم العرض'])}" loading="eager">
        <div class="hero-badge">✨ عرض مميز</div>
      </div>
      <div class="hero-body">
        <div class="agency-row">
          <div class="agency-logo-wrap">
            ${logo ? `<img src="${logo}" alt="${fmt(currentOffer['الوكالة'])}">` : `<span style="font-size:22px">🏢</span>`}
          </div>
          <div class="agency-info">
            <div class="agency-label">الوكالة المنظِّمة</div>

          <span class="tag">⏱️ ${fmt(currentOffer['المدة'])}</span>

    <div class="state-container">
      <p style="font-size:48px">⚠️</p>
      <p class="state-text" style="color:var(--red)">تعذّر تحميل البيانات. تحقق من اتصالك وأعد المحاولة.</p>
    </div>`;
});

function priceCell(label, val) {
  const v = val ? String(val).trim() : null;
  if (!v || v === "0" || v === "—") return "";
  const parts = v.replace(/\s*دج\s*$/i,"").split(",");
  const num = Number(parts[0].replace(/\s/g,"").replace(/,/g,""));
  const display = !isNaN(num) ? num.toLocaleString("ar-DZ") : v;
  return `<div class="price-cell">
    <span class="price-type">غرفة ${label}</span>
    <span class="price-amount">${display} <span>دج</span></span>
  </div>`;
}

/* ── LIKE ── */
function likeOffer() {
  if (!currentOffer) return;
  if (localStorage.getItem("liked_" + currentOffer.ID)) return;

  fetch(apiURL + "?action=like&id=" + currentOffer.ID)
    .then(r => r.json())
    .then(r => {
      if (r.success) {
        const n = r.likes;
        const el = document.getElementById("like-count");
        const bar = document.getElementById("like-count-bar");
        if (el)  el.textContent  = n;
        if (bar) bar.textContent = n;
        localStorage.setItem("liked_" + currentOffer.ID, "1");
        const lb = document.getElementById("likeBtn");
        lb.classList.add("disabled","liked");
      }
    });
}

/* ── SHARE ── */
function shareOffer() {
  const title = currentOffer ? currentOffer['اسم العرض'] : document.title;
  if (navigator.share) {
    navigator.share({
      title: "طريق العمرة – " + title,
      text: "🌟 اكتشف هذا العرض المميز على منصة طريق العمرة",
      url: location.href
    }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(location.href).then(() => alert("✅ تم نسخ الرابط!")).catch(() => alert("🔗 " + location.href));
  }
}

/* ── LIGHTBOX ── */
function openLightbox(src) {
  const lb = document.getElementById("lightbox");
  document.getElementById("lightbox-img").src = src;
  lb.classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("show");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
</script>
</body>
