<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العروض العامة للعمرة – طريق العمرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== TOKENS ===== */
:root {
  --navy:       #0D1B2A;
  --navy2:      #1B2E42;
  --teal:       #0E7C86;
  --teal2:      #12A0AD;
  --gold:       #D4A017;
  --gold-light: #F2D27A;
  --sand:       #F4F7FA;
  --sand2:      #E4EBF2;
  --charcoal:   #0D1B2A;
  --white:      #FFFFFF;
  --muted:      #5A7184;
  --green-wa:   #25D366;
  --radius:     18px;
  --shadow-sm:  0 2px 12px rgba(13,27,42,.10);
  --shadow-md:  0 8px 32px rgba(13,27,42,.18);
  --shadow-lg:  0 18px 50px rgba(13,27,42,.28);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Tajawal', Arial, sans-serif;
  background: var(--sand);
  color: var(--charcoal);
  min-height: 100vh;
}

/* ===== HEADER ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 9000;
  height: 64px;
  background: var(--navy);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  box-shadow: 0 4px 20px rgba(13,27,42,.45);
}

.topbar::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M20 20l10-10v20L20 20zm0 0L10 10v20l10-10z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}

.menu-btn {
  font-size: 22px;
  color: var(--white);
  cursor: pointer;
  z-index: 1;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: background .2s;
}
.menu-btn:hover { background: rgba(255,255,255,.12); }

.topbar-logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.topbar-logo img {
  height: 52px;
  width: auto;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.4));
  transition: transform .3s;
}
.topbar-logo img:hover { transform: scale(1.06); }

.visitor-badge {
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(8px);
  padding: 6px 14px;
  border-radius: 999px;
  z-index: 1;
}
.visitor-badge i { color: #7EEAF4; font-size: 16px; }
.visitor-badge span { color: var(--white); font-size: 15px; font-weight: 800; }
.visitor-badge small { color: rgba(255,255,255,.7); font-size: 12px; }

/* WhatsApp float */
.wa-float {
  position: fixed;
  top: 74px;
  left: 16px;
  width: 50px;
  height: 50px;
  background: var(--green-wa);
  color: var(--white);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  z-index: 8000;
  box-shadow: 0 6px 20px rgba(37,211,102,.45);
  transition: transform .25s, box-shadow .25s;
}
.wa-float:hover {
  transform: scale(1.1);
  box-shadow: 0 10px 28px rgba(37,211,102,.6);
}

/* ===== SIDE MENU ===== */
#sideMenu {
  position: fixed;
  top: 0; right: -280px;
  width: 280px; height: 100%;
  background: var(--navy);
  padding-top: 80px;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  z-index: 10000;
  box-shadow: -6px 0 30px rgba(0,0,0,.3);
}
#sideMenu.open { right: 0; }
#sideMenu a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,.08);
  transition: background .2s, padding-right .2s;
}
#sideMenu a:hover {
  background: rgba(255,255,255,.1);
  padding-right: 32px;
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 9000;
  backdrop-filter: blur(2px);
}

/* ===== HERO BANNER ===== */
.hero {
  background: linear-gradient(160deg, var(--navy) 0%, #0A2540 45%, #073748 100%);
  padding: 36px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23D4A017' fill-opacity='0.07'%3E%3Cpath d='M30 0l8.66 15H21.34L30 0zm0 60l-8.66-15h17.32L30 60zM0 30l15-8.66v17.32L0 30zm60 0l-15 8.66V21.34L60 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(14,124,134,.25);
  border: 1px solid rgba(14,124,134,.5);
  color: var(--gold-light);
  font-size: 13px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 999px;
  margin-bottom: 14px;
  letter-spacing: .5px;
}
.hero h2 {
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.3;
  position: relative;
}
.hero h2 span { color: var(--gold); }
.hero p {
  color: rgba(255,255,255,.65);
  font-size: 15px;
  margin-top: 8px;
  position: relative;
}

/* ===== FILTERS ===== */
.filters-bar {
  background: var(--white);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 64px;
  z-index: 7000;
}
.filters-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}
.filter-wrap {
  position: relative;
}
.filter-wrap i {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold);
  font-size: 14px;
  pointer-events: none;
}
select {
  width: 100%;
  padding: 10px 34px 10px 14px;
  border: 1.5px solid #CDD9E8;
  border-radius: 10px;
  font-family: 'Tajawal', Arial, sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--charcoal);
  background: var(--sand);
  appearance: none;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s;
}
select:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(14,124,134,.18);
}

/* ===== MAIN CONTENT ===== */
.content {
  max-width: 1280px;
  margin: 28px auto;
  padding: 0 16px;
}

.loading-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  font-size: 18px;
}
.loading-state i {
  font-size: 40px;
  color: var(--gold);
  display: block;
  margin-bottom: 16px;
  animation: spin 1.2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== AIRPORT GROUP ===== */
.airport-group { margin-bottom: 44px; }

.airport-heading {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--navy), var(--teal));
  color: var(--white);
  padding: 10px 22px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.airport-heading::after {
  content: '';
  display: block;
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
}

.airport-row {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.airport-row::-webkit-scrollbar { height: 4px; }
.airport-row::-webkit-scrollbar-track { background: var(--sand2); border-radius: 4px; }
.airport-row::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

/* ===== CARD ===== */
.card {
  scroll-snap-align: start;
  flex: 0 0 300px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .3s, box-shadow .3s;
  position: relative;
  border: 1px solid rgba(14,124,134,.18);
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-md);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--navy), var(--teal), var(--gold));
}

/* ===== CARD HEADER ===== */
.card-top {
  padding: 20px 16px 14px;
  background: linear-gradient(145deg, #EBF4F8, #DFF0F5);
  border-bottom: 1px solid rgba(14,124,134,.15);
  position: relative;
}

.offer-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
}

.agency-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: space-between;
}

.agency-info { flex: 1; min-width: 0; }
.agency-name {
  font-size: 16px;
  font-weight: 900;
  color: var(--charcoal);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.agency-loc {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--teal);
  font-size: 12px;
  font-weight: 700;
  margin-top: 4px;
  background: rgba(14,124,134,.08);
  padding: 3px 10px;
  border-radius: 999px;
}
.agency-loc i { font-size: 11px; }

.agency-logo-wrap {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  background: var(--white);
  border: 1.5px solid rgba(14,124,134,.25);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}
.agency-logo-wrap img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.agency-logo-wrap.empty::after {
  content: "🕌";
  font-size: 26px;
}

/* ===== DATE BADGE ===== */
.date-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 12px;
  margin: 14px 16px 0;
  font-weight: 700;
  font-size: 13px;
}
.date-badge.soon {
  background: linear-gradient(135deg, #FFF0F0, #FFD6D6);
  color: var(--navy);
  border: 1.5px solid rgba(13,27,42,.2);
}
.date-badge.mid {
  background: linear-gradient(135deg, #FFFBEE, #FFF0C0);
  color: #7A5200;
  border: 1.5px solid rgba(122,82,0,.2);
}
.date-badge.far {
  background: linear-gradient(135deg, #EDFAF3, #C6F0D8);
  color: #0B5F3C;
  border: 1.5px solid rgba(11,95,60,.2);
}
.date-badge .date-icon { font-size: 20px; }
.date-badge .date-text { flex: 1; }
.date-badge .date-main { font-size: 14px; font-weight: 800; display: block; }
.date-badge .date-remain { font-size: 11px; opacity: .8; display: block; margin-top: 2px; }
.date-badge.soon .date-remain { animation: pulse 1.8s ease-in-out infinite; display: inline-block; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

/* ===== CARD BODY ===== */
.card-body {
  padding: 14px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--charcoal);
  padding: 8px 12px;
  background: var(--sand);
  border-radius: 10px;
}
.info-row i {
  color: var(--gold);
  font-size: 15px;
  width: 18px;
  text-align: center;
}
.info-row span { font-weight: 700; }

.airline-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--sand);
  border-radius: 10px;
}
.airline-wrap img {
  height: 28px;
  max-width: 70px;
  object-fit: contain;
}
.airline-wrap span { font-size: 13px; font-weight: 600; color: var(--muted); }

/* ===== PRICE ===== */
.price-section {
  padding: 0 16px 14px;
}
.price-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--teal) 0%, #065960 100%);
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: 0 6px 20px rgba(13,27,42,.28);
}
.price-amount {
  flex: 1;
  color: var(--white);
  font-size: 22px;
  font-weight: 900;
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.price-amount small {
  font-size: 13px;
  font-weight: 600;
  opacity: .8;
}
.price-amount .currency {
  font-size: 13px;
  font-weight: 700;
  color: var(--gold-light);
  opacity: 1;
}
.wa-btn {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  border: none;
  background: var(--green-wa);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(37,211,102,.4);
  transition: transform .2s, box-shadow .2s;
  flex-shrink: 0;
}
.wa-btn i { color: var(--white); font-size: 22px; }
.wa-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 20px rgba(37,211,102,.6);
}
.wa-btn:active { transform: scale(.94); }

/* ===== CARD ACTIONS ===== */
.card-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-top: 1px solid var(--sand2);
}
.action-btn {
  padding: 12px 6px;
  border: none;
  background: transparent;
  font-family: 'Tajawal', Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: background .2s, color .2s;
}
.action-btn i { font-size: 16px; }
.action-btn:not(:last-child) { border-left: 1px solid var(--sand2); }
.action-btn:hover { background: var(--sand); }
.action-btn.register {
  color: var(--white);
  background: var(--teal);
}
.action-btn.register:hover { background: var(--teal2); }

/* ===== MODALS ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,17,16,.7);
  z-index: 20000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal-box {
  width: 100%;
  max-width: 420px;
  max-height: 85vh;
  background: var(--white);
  border-radius: 22px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  box-shadow: var(--shadow-lg);
  animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn {
  from { transform: scale(.88) translateY(20px); opacity: 0; }
  to   { transform: scale(1)   translateY(0);    opacity: 1; }
}
.modal-header {
  background: linear-gradient(135deg, var(--navy), var(--teal));
  padding: 20px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.modal-title {
  color: var(--white);
  font-size: 18px;
  font-weight: 900;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-close {
  width: 34px;
  height: 34px;
  border: 2px solid rgba(255,255,255,.35);
  background: transparent;
  color: var(--white);
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
  line-height: 1;
}
.modal-close:hover { background: rgba(255,255,255,.18); }
.modal-body { padding: 22px; }

/* Detail rows */
.detail-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  background: var(--sand);
  margin-bottom: 8px;
  font-size: 14px;
}
.detail-row i {
  color: var(--gold);
  font-size: 17px;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
}
.detail-row .dr-label { color: var(--muted); font-size: 12px; }
.detail-row .dr-val { font-weight: 800; color: var(--charcoal); }

/* Form */
.form-field {
  margin-bottom: 12px;
}
.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 6px;
}
.form-field input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #C8DCE8;
  border-radius: 10px;
  font-family: 'Tajawal', Arial, sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--charcoal);
  background: var(--sand);
  transition: border-color .2s, box-shadow .2s;
}
.form-field input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(14,124,134,.18);
}
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--teal), #065960);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: 'Tajawal', Arial, sans-serif;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 4px;
  box-shadow: 0 6px 20px rgba(13,27,42,.28);
  transition: transform .2s, box-shadow .2s;
}
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(13,27,42,.38);
}
.btn-cancel {
  width: 100%;
  padding: 12px;
  background: var(--sand2);
  color: var(--muted);
  border: none;
  border-radius: 12px;
  font-family: 'Tajawal', Arial, sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s;
}
.btn-cancel:hover { background: #D0E4EE; }

/* Empty / error states */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state i {
  font-size: 48px;
  color: var(--sand2);
  margin-bottom: 14px;
  display: block;
}

/* ===== RESPONSIVE ===== */
@media (min-width: 768px) {
  .card { flex: 0 0 320px; }
  .modal-box { max-width: 460px; }
}
@media (max-width: 600px) {
  .hero { padding: 24px 16px 20px; }
  .topbar-logo img { height: 46px; }
  .card { flex: 0 0 272px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1A1110;
  color: var(--white);
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
  z-index: 99999;
  box-shadow: var(--shadow-md);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>
<body>

<!-- WhatsApp Float -->
<a href="https://wa.me/213674141379" target="_blank" class="wa-float">
  <i class="fab fa-whatsapp"></i>
</a>

<!-- HEADER -->
<header class="topbar">
  <div class="menu-btn" onclick="openMenu()" aria-label="القائمة">
    <i class="fa-solid fa-bars"></i>
  </div>

  <div class="topbar-logo" onclick="location.reload()">
    <img src="https://res.cloudinary.com/dmc36nijl/image/upload/v1769426692/ei_1769426620917-removebg-preview_yuws6p.png" alt="طريق العمرة">
  </div>

  <div class="visitor-badge">

<main class="content">

<!-- REGISTER MODAL -->
<div class="modal-overlay" id="registerModal" onclick="closeRegisterModal()">

    <div class="modal-header">
      <div class="modal-title"><i class="fa-solid fa-paper-plane"></i> تسجيل في العرض</div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const OFFERS_API = "https://script.google.com/macros/s/AKfycbyHkwOJhtwPmrKUr2Xu05M_eU9tKvVa-cZxgMAgb_QQ-mw1ZrXFxauvZDpMp1f8WKmE7A/exec";

let offersData = [], selectedOffer = null;

const fAgency  = document.getElementById("fAgency");
const fState   = document.getElementById("fState");
const fDate    = document.getElementById("fDate");
const fAirport = document.getElementById("fAirport");
const offersEl = document.getElementById("offers");

/* ── helpers ── */

/*
  parseLocalDate — تحويل التاريخ دون تأثير UTC
  الإصلاح: إضافة 12,0,0 (الظهر) يمنع إزاحة اليوم بسبب فارق التوقيت
*/
function parseLocalDate(dateStr) {
  if (!dateStr) return null;
  const s = String(dateStr).trim();

  // ISO: YYYY-MM-DD
  const iso = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (iso) {
    // ✅ بناء التاريخ بـ UTC مباشرة بدون أي timezone
    return new Date(Date.UTC(+iso[1], +iso[2] - 1, +iso[3], 12, 0, 0));
  }

  // DD/MM/YYYY
  const dmy = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if (dmy) {
    return new Date(Date.UTC(+dmy[3], +dmy[2] - 1, +dmy[1], 12, 0, 0));
  }

  // Google Sheets serial number
  if (/^\d+$/.test(s)) {
    const base = new Date(Date.UTC(1899, 11, 30));
    return new Date(base.getTime() + parseInt(s) * 86400000);
  }

  return null;
}
function formatDate(d) {
  const p = parseLocalDate(d);
  return p ? p.toLocaleDateString("ar-DZ") : "-";
}

function formatDateArabicFull(dateStr) {
  if (!dateStr) return "-";
  const days   = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  const months = ["جانفي","فيفري","مارس","أفريل","ماي","جوان","جويلية","أوت","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const d = parseLocalDate(dateStr);
  if (!d || isNaN(d)) return "-";
  // ✅ getUTC بدل get
  return `${days[d.getUTCDay()]} ${d.getUTCDate()} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

function getDateStatus(dateStr) {
  if (!dateStr) return "far";
  const travel = parseLocalDate(dateStr);
  if (!travel || isNaN(travel)) return "far";
  const today = new Date();
  // ✅ مقارنة UTC
  const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const travelUTC = Date.UTC(travel.getUTCFullYear(), travel.getUTCMonth(), travel.getUTCDate());
  const diff = Math.round((travelUTC - todayUTC) / (1000 * 60 * 60 * 24));
  if (diff <= 15) return "soon";
  if (diff <= 40) return "mid";
  return "far";
}

function getRemainingText(dateStr) {
  if (!dateStr) return "";
  const travel = parseLocalDate(dateStr);
  if (!travel || isNaN(travel)) return "";
  const today = new Date();
  const todayUTC  = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const travelUTC = Date.UTC(travel.getUTCFullYear(), travel.getUTCMonth(), travel.getUTCDate());
  const diff = Math.round((travelUTC - todayUTC) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "🚀 اليوم موعد الرحلة";
  if (diff === 1) return "⚠️ غدًا الانطلاق";
  if (diff > 1)  return `⏳ بعد ${diff} يوم`;
  return "⛔ تاريخ منقضي";
}
function showToast(msg, icon = "✅") {
  const t = document.getElementById("toast");
  t.innerHTML = `${icon} ${msg}`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

/* ── fetch ── */
fetch(OFFERS_API).then(r => r.json()).then(data => {
  offersData = data;
  fillFilters();
  render();
}).catch(() => {
  offersEl.innerHTML = `<div class="empty-state">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <p>تعذّر تحميل العروض. تحقق من الاتصال وأعد المحاولة.</p>
  </div>`;
});

function fillFilters() {
  const A = new Set(), S = new Set(), D = new Set(), P = new Set();
  offersData.forEach(o => {
    if (o.agency)  A.add(o.agency);
    if (o.state)   S.add(o.state);
    if (o.date)    D.add(formatDate(o.date));
    if (o.airport) P.add(o.airport);
  });
  A.forEach(v => fAgency.add(new Option(v, v)));
  S.forEach(v => fState.add(new Option(v, v)));
  D.forEach(v => fDate.add(new Option(v, v)));
  P.forEach(v => fAirport.add(new Option(v, v)));
}

[fAgency, fState, fDate, fAirport].forEach(s => s.addEventListener("change", render));

/* ── render ── */
function render() {
  offersEl.innerHTML = "";
  let list = [...offersData];
  if (fAgency.value)  list = list.filter(o => o.agency  === fAgency.value);
  if (fState.value)   list = list.filter(o => o.state   === fState.value);
  if (fDate.value)    list = list.filter(o => formatDate(o.date) === fDate.value);
  if (fAirport.value) list = list.filter(o => o.airport === fAirport.value);

  if (!list.length) {
    offersEl.innerHTML = `<div class="empty-state">
      <i class="fa-solid fa-magnifying-glass"></i>
      <p>لا توجد عروض تطابق الفلتر المحدد</p>
    </div>`;
    return;
  }

  const grouped = {};
  list.forEach(o => {
    const ap = o.airport || "غير محدد";
    if (!grouped[ap]) grouped[ap] = [];
    grouped[ap].push(o);
  });

  Object.keys(grouped).forEach(ap => {
    grouped[ap].sort((a, b) => parseLocalDate(a.date) - parseLocalDate(b.date));

    const g = document.createElement("div");
    g.className = "airport-group";
    g.innerHTML = `<div class="airport-heading"><i class="fa-solid fa-plane-departure"></i> ${ap}</div>`;

    const row = document.createElement("div");
    row.className = "airport-row";

    grouped[ap].forEach(o => {
      const idx    = offersData.indexOf(o);
      const status = getDateStatus(o.date);
      const remain = getRemainingText(o.date);
      const c = document.createElement("div");
      c.className = "card";
      c.innerHTML = `
        <!-- TOP -->
        <div class="card-top">
          <div class="offer-badge"><i class="fa-solid fa-kaaba"></i> ${o.offer || "عرض عمرة"}</div>
          <div class="agency-row">
            <div class="agency-info">
              <div class="agency-name">${o.agency || "—"}</div>
              <div class="agency-loc"><i class="fa-solid fa-location-dot"></i> ${o.state || "—"}</div>
            </div>
            <div class="agency-logo-wrap ${!o.logo ? 'empty' : ''}">
              ${o.logo ? `<img src="${o.logo}" alt="${o.agency}">` : ''}
            </div>
          </div>
        </div>

        <!-- DATE -->
        <div class="date-badge ${status}">
          <span class="date-icon"><i class="fa-regular fa-calendar-check"></i></span>
          <div class="date-text">
            <span class="date-main">${formatDateArabicFull(o.date)}</span>
            <span class="date-remain">${remain}</span>
          </div>
        </div>

        <!-- BODY -->
        <div class="card-body">
          <div class="info-row"><i class="fa-solid fa-hotel"></i><span>الفندق:</span> ${o.hotel || "—"}</div>
          <div class="info-row"><i class="fa-regular fa-clock"></i><span>المدة:</span> ${o.duration || "—"}</div>
          <div class="airline-wrap">
            ${o.airlineLogo ? `<img src="${o.airlineLogo}" alt="">` : `<i class="fa-solid fa-plane" style="color:var(--gold)"></i>`}
            <span>${o.flight || "—"}</span>
          </div>
        </div>

        <!-- PRICE -->
        <div class="price-section">
          <div class="price-row">
            <div class="price-amount">
              ${Number(o.group).toLocaleString("ar-DZ")}
              <span class="currency">دج</span>
            </div>
            <button class="wa-btn" onclick="openWaByIdx(${idx})" title="واتساب">
              <i class="fab fa-whatsapp"></i>
            </button>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="card-actions">
          <button class="action-btn" onclick="openDetailsByIdx(${idx})">
            <i class="fa-solid fa-circle-info"></i> التفاصيل
          </button>
          <button class="action-btn" onclick="shareByIdx(${idx})">
            <i class="fa-solid fa-share-nodes"></i> مشاركة
          </button>
          <button class="action-btn register" onclick="openRegisterByIdx(${idx})">
            <i class="fa-solid fa-paper-plane"></i> تسجيل
          </button>
        </div>
      `;
      row.appendChild(c);
    });

    g.appendChild(row);
    offersEl.appendChild(g);
  });
}

/* ── details ── */
function openDetailsByIdx(i) {
  const o = offersData[i];
  if (!o) return;
  document.getElementById("detailsContent").innerHTML = `
    <div class="detail-row"><i class="fa-solid fa-kaaba"></i><div><div class="dr-label">العرض</div><div class="dr-val">${o.offer || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-solid fa-building"></i><div><div class="dr-label">الوكالة</div><div class="dr-val">${o.agency || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-solid fa-location-dot"></i><div><div class="dr-label">الولاية</div><div class="dr-val">${o.state || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-solid fa-plane-departure"></i><div><div class="dr-label">المطار</div><div class="dr-val">${o.airport || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-regular fa-calendar-check"></i><div><div class="dr-label">تاريخ الانطلاق</div><div class="dr-val">${formatDateArabicFull(o.date)}</div></div></div>
    <div class="detail-row"><i class="fa-solid fa-hotel"></i><div><div class="dr-label">الفندق</div><div class="dr-val">${o.hotel || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-regular fa-clock"></i><div><div class="dr-label">المدة</div><div class="dr-val">${o.duration || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-solid fa-plane"></i><div><div class="dr-label">رقم الرحلة</div><div class="dr-val">${o.flight || "—"}</div></div></div>
    <div class="detail-row"><i class="fa-solid fa-tag"></i><div><div class="dr-label">السعر</div><div class="dr-val" style="color:var(--teal);font-size:20px">${Number(o.group).toLocaleString("ar-DZ")} دج</div></div></div>
    ${o.notes ? `<div class="detail-row"><i class="fa-solid fa-note-sticky"></i><div><div class="dr-label">ملاحظات</div><div class="dr-val">${o.notes}</div></div></div>` : ''}
  `;
  document.getElementById("detailsModal").classList.add("open");
}
function closeDetails() { document.getElementById("detailsModal").classList.remove("open"); }

/* ── register ── */
function openRegisterByIdx(i) {
  selectedOffer = offersData[i];
  document.getElementById("cFirst").value = "";
  document.getElementById("cLast").value  = "";
  document.getElementById("cPhone").value = "";
  document.getElementById("registerModal").classList.add("open");
}
function closeRegisterModal() { document.getElementById("registerModal").classList.remove("open"); }

function sendRegister() {
  const first = document.getElementById("cFirst").value.trim();
  const last  = document.getElementById("cLast").value.trim();
  const phone = document.getElementById("cPhone").value.trim();
  if (!first || !last || !phone) { showToast("أكمل جميع الحقول", "⚠️"); return; }
  const msg = encodeURIComponent(
    `🕋 طلب تسجيل في عرض عمرة\n\n` +
    `👤 الاسم: ${first} ${last}\n📞 الهاتف: ${phone}\n` +
    `🏢 الوكالة: ${selectedOffer?.agency || "—"}\n` +
    `📅 التاريخ: ${formatDateArabicFull(selectedOffer?.date)}\n` +
    `💰 السعر: ${selectedOffer?.group || "—"} دج`
  );
  window.open(`https://wa.me/${selectedOffer?.phone || "213674141379"}?text=${msg}`, "_blank");
  closeRegisterModal();
  showToast("تم إرسال طلبك بنجاح");
}

/* ── whatsapp ── */
function openWaByIdx(i) {
  const o = offersData[i];
  if (!o) return;
  const msg = encodeURIComponent(
    `🕋 استفسار عن عرض عمرة\n\n` +
    `🏢 الوكالة: ${o.agency || "—"}\n` +
    `📅 التاريخ: ${formatDateArabicFull(o.date)}\n` +
    `💰 السعر: ${o.group || "—"} دج\n` +
    `✈️ المطار: ${o.airport || "—"}`
  );
  window.open(`https://wa.me/${o.phone || "213674141379"}?text=${msg}`, "_blank");
}

/* ── share ── */
function shareByIdx(i) {
  const o = offersData[i];
  if (!o) return;
  const text = `🕋 عرض عمرة – ${o.agency}\n📅 ${formatDateArabicFull(o.date)}\n💰 ${o.group} دج\n✈️ ${o.airport || ""}`;
  if (navigator.share) {
    navigator.share({ title: "عرض عمرة", text });
  } else {
    navigator.clipboard?.writeText(text).then(() => showToast("تم نسخ العرض"));
  }
}

/* ── menu ── */
function openMenu() {
  document.getElementById("sideMenu").classList.add("open");
  document.getElementById("overlay").style.display = "block";
}
function closeMenu() {
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("overlay").style.display = "none";
}

/* ── visitors (fake counter) ── */
let v = Math.floor(Math.random() * 300) + 120;
document.getElementById("visitors").textContent = v;
setInterval(() => {
  if (Math.random() < .3) { v++; document.getElementById("visitors").textContent = v; }
}, 6000);
</script>
